<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details | Mood Movie Picker</title>
    <link rel="stylesheet" href="/css/style.css">
    <script type="module" src="/js/details.js"></script>
</head>
<body>
    <header id="main-header"></header>

    <main>
        <button class="back-btn" id="back-btn">← Back to Results</button>

            </div>
        </div>
        
        <div id="favorite-btn-container" class="favorite-container"></div>
    </main>

    <footer id="main-footer"></footer>
</body>
</html>
