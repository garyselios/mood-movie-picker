<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorites | Mood Movie Picker</title>
    <link rel="stylesheet" href="/css/style.css">
    <script type="module" src="/js/favorites.js"></script>
</head>
<body>
    <header id="main-header"></header>

    <main>
        <button class="back-btn" id="back-btn">← Back to Home</button>
        
        <h1>❤️ My Favorite Movies</h1>
        <p class="subtitle">Movies you've saved to watch later</p>
        
        <div id="favorites-container" class="results-grid">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading your favorites... 🎬</p>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>
</body>
</html>
